<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .b1 > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 8; }
  .b2 > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 8; }
  .b3 > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5px; rx: 8; }
  .b4 > rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5px; rx: 8; }
  .b5 > rect { fill: #FCEBEB; stroke: #A32D2D; stroke-width: 0.5px; rx: 8; }
</style>
<text class="th" x="340" y="24" text-anchor="middle" font-size="16">Vanlige sikkerhetstrusler — og mottiltak</text>
<g class="b3"><rect x="30" y="50" width="180" height="44"/><text class="th" x="120" y="72" text-anchor="middle" dominant-baseline="central">Phishing</text></g>
<g class="b5"><rect x="250" y="50" width="180" height="44"/><text class="th" x="340" y="72" text-anchor="middle" dominant-baseline="central">Ransomware</text></g>
<g class="b4"><rect x="470" y="50" width="180" height="44"/><text class="th" x="560" y="72" text-anchor="middle" dominant-baseline="central">DDoS</text></g>
<g class="b1"><rect x="30" y="130" width="180" height="44"/><text class="th" x="120" y="152" text-anchor="middle" dominant-baseline="central">Insider-trussel</text></g>
<g class="b2"><rect x="250" y="130" width="180" height="44"/><text class="th" x="340" y="152" text-anchor="middle" dominant-baseline="central">Man-in-the-Middle</text></g>
<text class="ts" x="120" y="205" text-anchor="middle">Opplæring + MFA</text>
<text class="ts" x="340" y="205" text-anchor="middle">Immutable backup</text>
<text class="ts" x="560" y="205" text-anchor="middle">Rate limiting + CDN</text>
<text class="ts" x="120" y="225" text-anchor="middle">Minste privilegium + logging</text>
<text class="ts" x="340" y="225" text-anchor="middle">TLS/HTTPS + VPN</text>
<text class="ts" x="340" y="255" text-anchor="middle" font-size="11" fill="#993C1D">Kjenn truslene — og ha et mottiltak klart for hver</text>
</svg>