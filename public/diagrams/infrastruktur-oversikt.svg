<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .core > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 6; }
  .net > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 6; }
  .sto > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5px; rx: 6; }
  .pow > rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5px; rx: 6; }
  .arr { stroke: #5f5e5a; stroke-width: 1.5px; fill: none; }
  .cont { fill: none; stroke: #534AB7; stroke-width: 0.5px; stroke-dasharray: 6 4; rx: 12; }
</style>
<rect x="30" y="30" width="620" height="280" class="cont"/>
<text class="th" x="50" y="54" fill="#534AB7">IT-infrastruktur — nødvendige komponenter</text>
<g class="core"><rect x="55" y="80" width="180" height="40"/><text class="ts" x="145" y="100" text-anchor="middle" dominant-baseline="central">DC (domenekontroller)</text></g>
<g class="core"><rect x="55" y="130" width="180" height="40"/><text class="ts" x="145" y="150" text-anchor="middle" dominant-baseline="central">DHCP/DNS-server</text></g>
<g class="core"><rect x="55" y="180" width="180" height="40"/><text class="ts" x="145" y="200" text-anchor="middle" dominant-baseline="central">Backup-server</text></g>
<g class="net"><rect x="265" y="80" width="180" height="40"/><text class="ts" x="355" y="100" text-anchor="middle" dominant-baseline="central">Brannmur</text></g>
<g class="net"><rect x="265" y="130" width="180" height="40"/><text class="ts" x="355" y="150" text-anchor="middle" dominant-baseline="central">Svitsj (managed)</text></g>
<g class="net"><rect x="265" y="180" width="180" height="40"/><text class="ts" x="355" y="200" text-anchor="middle" dominant-baseline="central">Ruter</text></g>
<g class="net"><rect x="265" y="230" width="180" height="40"/><text class="ts" x="355" y="250" text-anchor="middle" dominant-baseline="central">Trådløst aksesspunkt</text></g>
<g class="sto"><rect x="475" y="80" width="150" height="50"/><text class="th" x="550" y="100" text-anchor="middle" dominant-baseline="central">NAS</text><text class="ts" x="550" y="118" text-anchor="middle" dominant-baseline="central">fillager</text></g>
<g class="pow"><rect x="475" y="155" width="150" height="50"/><text class="th" x="550" y="175" text-anchor="middle" dominant-baseline="central">UPS</text><text class="ts" x="550" y="193" text-anchor="middle" dominant-baseline="central">strømbackup</text></g>
<text class="ts" x="145" y="72" text-anchor="middle" font-size="11" fill="#534AB7">Kjernetjenester</text>
<text class="ts" x="355" y="72" text-anchor="middle" font-size="11" fill="#0F6E56">Nettverksutstyr</text>
<text class="ts" x="550" y="72" text-anchor="middle" font-size="11" fill="#993C1D">Lagring/Strøm</text>
</svg>