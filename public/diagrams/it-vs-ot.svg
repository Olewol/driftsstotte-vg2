<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .it > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5px; rx: 10; }
  .ot > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5px; rx: 10; }
  .fw > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5px; rx: 8; }
  .arr { stroke: #5f5e5a; stroke-width: 1.5px; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<text class="th" x="340" y="24" text-anchor="middle" font-size="16">IT vs OT — separer nettverkene</text>
<g class="it"><rect x="30" y="50" width="260" height="180"/><text class="th" x="160" y="74" text-anchor="middle">IT-nettverk</text>
<text class="ts" x="50" y="104">Kontor-PC-er</text>
<text class="ts" x="50" y="128">Servere</text>
<text class="ts" x="50" y="152">Skrivere</text>
<text class="ts" x="50" y="176">Oppdateres jevnlig ✓</text>
<text class="ts" x="50" y="200">Standard sikkerhet ✓</text>
</g>
<g class="fw"><rect x="300" y="100" width="80" height="70"/><text class="ts" x="340" y="125" text-anchor="middle" dominant-baseline="central" font-weight="600">BRANNMUR</text><text class="ts" x="340" y="150" text-anchor="middle" dominant-baseline="central">Kun nødvendig trafikk</text></g>
<g class="ot"><rect x="390" y="50" width="260" height="180"/><text class="th" x="520" y="74" text-anchor="middle">OT-nettverk</text>
<text class="ts" x="410" y="104">PLC-er</text>
<text class="ts" x="410" y="128">SCADA-systemer</text>
<text class="ts" x="410" y="152">Produksjonsmaskiner</text>
<text class="ts" x="410" y="176">Kan ikke oppdateres ✗</text>
<text class="ts" x="410" y="200">Isolasjon = eneste forsvar</text>
</g>
<line x1="290" y1="135" x2="298" y2="135" class="arr" marker-end="url(#arrow)"/>
<line x1="380" y1="135" x2="388" y2="135" class="arr" marker-end="url(#arrow)"/>
</svg>