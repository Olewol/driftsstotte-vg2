<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .b > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5px; rx: 6; }
  .g > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 6; }
  .p > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 6; }
  .c > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5px; rx: 6; }
  .a > rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5px; rx: 6; }
  .gr > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5px; rx: 6; }
  .title { fill: #1a1a18; }
  .s-title { fill: #5f5e5a; }
</style>
<text class="th" x="340" y="28" text-anchor="middle" font-size="16">Forsvar i dybden — 7 lag</text>
<text class="ts" x="340" y="48" text-anchor="middle">Ett gjennombrudd = ikke katastrofe. Angriperen må bryte alle lagene.</text>
<g class="gr"><rect x="100" y="70" width="480" height="46"/><text class="t" x="120" y="93">Lag 1: Brannmur — ytre perimeter</text></g>
<g class="b"><rect x="100" y="130" width="480" height="46"/><text class="t" x="120" y="153">Lag 2: Nettverkssegmentering — VLAN</text></g>
<g class="c"><rect x="100" y="190" width="480" height="46"/><text class="t" x="120" y="213">Lag 3: Antivirus / EDR — endpoint detection</text></g>
<g class="a"><rect x="100" y="250" width="480" height="46"/><text class="t" x="120" y="273">Lag 4: Tilgangskontroll — RBAC, minste privilegium</text></g>
<g class="g"><rect x="100" y="310" width="480" height="46"/><text class="t" x="120" y="333">Lag 5: Kryptering — i ro og i transit</text></g>
<g class="p"><rect x="100" y="370" width="480" height="46"/><text class="t" x="120" y="393">Lag 6: Opplæring — sosial manipulasjon</text></g>
<g class="gr"><rect x="100" y="430" width="480" height="46"/><text class="t" x="120" y="453">Lag 7: Backup og gjenoppretting — siste forsvarslinje</text></g>
</svg>