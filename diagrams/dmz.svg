<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .arr { stroke: #5f5e5a; stroke-width: 1.5px; fill: none; }
  .box-red > rect { fill: #FCEBEB; stroke: #A32D2D; stroke-width: 0.5px; rx: 8; }
  .box-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 8; }
  .box-teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 8; }
  .box-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5px; rx: 8; }
  .container { fill: none; stroke: #534AB7; stroke-width: 0.5px; stroke-dasharray: 6 4; rx: 12; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<g class="box-gray">
  <rect x="30" y="80" width="100" height="44"/>
  <text class="th" x="80" y="102" text-anchor="middle" dominant-baseline="central">Internett</text>
</g>
<g class="box-red">
  <rect x="170" y="80" width="120" height="44"/>
  <text class="ts" x="230" y="102" text-anchor="middle" dominant-baseline="central">Ytre brannmur</text>
</g>
<rect x="320" y="40" width="220" height="160" class="container"/>
<text class="th" x="340" y="62" fill="#534AB7">DMZ-sone</text>
<g class="box-teal">
  <rect x="340" y="80" width="180" height="40"/>
  <text class="ts" x="430" y="100" text-anchor="middle" dominant-baseline="central">Webserver</text>
</g>
<g class="box-teal">
  <rect x="340" y="130" width="180" height="40"/>
  <text class="ts" x="430" y="150" text-anchor="middle" dominant-baseline="central">E-postserver</text>
</g>
<g class="box-red">
  <rect x="170" y="240" width="120" height="44"/>
  <text class="ts" x="230" y="262" text-anchor="middle" dominant-baseline="central">Indre brannmur</text>
</g>
<g class="box-gray">
  <rect x="340" y="240" width="200" height="44"/>
  <text class="th" x="440" y="262" text-anchor="middle" dominant-baseline="central">Internt nett</text>
</g>
<line x1="130" y1="102" x2="170" y2="102" class="arr" marker-end="url(#arrow)"/>
<line x1="290" y1="102" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>
<line x1="430" y1="170" x2="430" y2="210" class="arr" marker-end="url(#arrow)"/>
<line x1="430" y1="210" x2="230" y2="240" class="arr" marker-end="url(#arrow)"/>
<line x1="290" y1="262" x2="340" y2="262" class="arr" marker-end="url(#arrow)"/>
</svg>