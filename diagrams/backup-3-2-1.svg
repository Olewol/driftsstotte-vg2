<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .b > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5px; rx: 8; }
  .g > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 8; }
  .p > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 8; }
  .arr { stroke: #5f5e5a; stroke-width: 1.5px; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<g class="p"><rect x="30" y="60" width="160" height="56"/><text class="th" x="110" y="80" text-anchor="middle" dominant-baseline="central">Primærdata</text><text class="ts" x="110" y="100" text-anchor="middle" dominant-baseline="central">Produksjon</text></g>
<g class="b"><rect x="260" y="60" width="160" height="56"/><text class="th" x="340" y="80" text-anchor="middle" dominant-baseline="central">Backup 1</text><text class="ts" x="340" y="100" text-anchor="middle" dominant-baseline="central">NAS / fillager</text></g>
<g class="g"><rect x="490" y="60" width="160" height="56"/><text class="th" x="570" y="80" text-anchor="middle" dominant-baseline="central">Backup 2</text><text class="ts" x="570" y="100" text-anchor="middle" dominant-baseline="central">Skytjeneste</text></g>
<text class="t" x="110" y="162" text-anchor="middle">3 kopier</text>
<text class="t" x="340" y="162" text-anchor="middle">2 ulike medier</text>
<text class="t" x="570" y="162" text-anchor="middle">1 offsite</text>
<line x1="190" y1="88" x2="260" y2="88" class="arr" marker-end="url(#arrow)"/>
<line x1="420" y1="88" x2="490" y2="88" class="arr" marker-end="url(#arrow)"/>
</svg>