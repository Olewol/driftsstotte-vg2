<svg width="100%" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .host > rect { fill: none; stroke: #534AB7; stroke-width: 1px; rx: 12; }
  .hv > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 6; }
  .vm > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 6; }
</style>
<rect x="30" y="20" width="620" height="190" class="host"/>
<text class="th" x="50" y="44" fill="#534AB7">Fysisk vert (server)</text>
<g class="hv"><rect x="50" y="60" width="580" height="36"/><text class="th" x="340" y="78" text-anchor="middle" dominant-baseline="central">Hypervisor (Type 1 / Type 2)</text></g>
<g class="vm"><rect x="60" y="120" width="170" height="56"/><text class="th" x="145" y="140" text-anchor="middle" dominant-baseline="central">VM 1</text><text class="ts" x="145" y="160" text-anchor="middle" dominant-baseline="central">Windows Server</text></g>
<g class="vm"><rect x="255" y="120" width="170" height="56"/><text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central">VM 2</text><text class="ts" x="340" y="160" text-anchor="middle" dominant-baseline="central">Linux</text></g>
<g class="vm"><rect x="450" y="120" width="170" height="56"/><text class="th" x="535" y="140" text-anchor="middle" dominant-baseline="central">VM 3</text><text class="ts" x="535" y="160" text-anchor="middle" dominant-baseline="central">Windows 10</text></g>
</svg>