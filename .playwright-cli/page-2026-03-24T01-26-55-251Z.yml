          - heading "Detaljert beskrivelse av hvert lag" [level=3] [ref=e103]
          - paragraph [ref=e104]:
            - strong [ref=e105]: Lag 1 — Fysisk lag
            - text: Det fysiske laget definerer de elektriske, optiske og trådløse signalene som representerer biter (0 og 1). Det inkluderer kontakttyper (RJ-45), kabeltyper (Cat5e, Cat6, fiber), og overføringsmetoder. Ingenting her kjenner til adresser eller logisk struktur — det er bare bits.
          - paragraph [ref=e106]:
            - strong [ref=e107]: Lag 2 — Datalinklaget
            - text: Pakker biter inn i
            - emphasis [ref=e108]: frames
            - text: "og håndterer overføring innenfor ett nettverkssegment. Delt i to underlag:"
          - list [ref=e109]:
            - listitem [ref=e110]:
              - strong [ref=e111]: MAC (Media Access Control)
              - text: ": adressering med 48-bits MAC-adresser, kontroll av tilgang til mediet"
            - listitem [ref=e112]:
              - strong [ref=e113]: LLC (Logical Link Control)
              - text: ": feildeteksjon, flomstyring"
          - paragraph [ref=e114]: En svitsj opererer på lag 2. Ethernet er den dominerende lag 2-protokollen i kablede nettverk.
          - paragraph [ref=e115]:
            - strong [ref=e116]: Lag 3 — Nettverkslaget
            - text: Introduserer logisk adressering (IP-adresser) og ruting mellom nettverk. En ruter opererer på lag 3. Nettverkslaget bestemmer den beste veien fra kilde til destinasjon gjennom potensielt mange mellomliggende nettverk.
          - paragraph [ref=e117]:
            - strong [ref=e118]: Lag 4 — Transportlaget
            - text: Segmenterer data fra applikasjonslaget og håndterer ende-til-ende-kommunikasjon. TCP gir pålitelig levering med sekvensnumre og bekreftelser (ACK). UDP er rask og enkel uten slike garantier. Portnumre identifiserer hvilken applikasjon trafikken tilhører.
          - paragraph [ref=e119]:
            - strong [ref=e120]: Lag 5 — Sesjonslaget
            - text: Administrerer
            - emphasis [ref=e121]: sesjoner
            - text: — vedvarende forbindelser mellom applikasjoner. Sesjonslaget oppretter, vedlikeholder og avslutter dialogen mellom to systemer. I praksis er mye av denne funksjonaliteten integrert i applikasjonsprotokoller i TCP/IP.
          - paragraph [ref=e122]:
            - strong [ref=e123]: Lag 6 — Presentasjonslaget
            - text: "Oversetter data mellom applikasjonens format og nettverkets format. Ansvarlig for:"
          - list [ref=e124]:
            - listitem [ref=e125]:
              - strong [ref=e126]: Kryptering/dekryptering
              - text: ": TLS/SSL krypterer HTTP-trafikk til HTTPS"
            - listitem [ref=e127]:
              - strong [ref=e128]: Komprimering
              - text: ": reduserer datamengden som sendes"
            - listitem [ref=e129]:
              - strong [ref=e130]: Formatkonvertering
              - text: ": sikrer at f.eks. tegnsett (UTF-8, ASCII) tolkes likt på begge sider"
          - paragraph [ref=e131]:
            - strong [ref=e132]: Lag 7 — Applikasjonslaget
            - text: "Det øverste laget er det brukeren møter. Her befinner seg protokollene som applikasjoner bruker direkte: HTTP for nettlesing, SMTP for e-postsending, FTP for filoverføring, DNS for navneoppløsning."
          - heading "Innkapsling og PDU" [level=3] [ref=e133]
          - paragraph [ref=e134]:
            - text: Når data sendes nedover gjennom OSI-lagene, legger hvert lag til sin egen kontrollinformasjon (header). Denne prosessen kalles
            - strong [ref=e135]: innkapsling (encapsulation)
            - text: . Hvert lag opererer med sin egen
            - strong [ref=e136]: PDU (Protocol Data Unit)
            - text: ": på lag 4 kalles den"
            - emphasis [ref=e137]: Segment
            - text: ", på lag 3"
            - emphasis [ref=e138]: Pakke
            - text: ", og på lag 2"
            - emphasis [ref=e139]: Ramme
            - text: . Ved mottak pakkes det ut i omvendt rekkefølge — hvert lag leser og fjerner sin header.
