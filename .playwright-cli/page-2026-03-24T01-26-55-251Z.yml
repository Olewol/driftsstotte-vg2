          - paragraph [ref=e197]: OSI-modellens lag 5, 6 og 7 tilsvarer samlet applikasjonslaget i TCP/IP. I praksis er funksjonene fra presentasjons- og sesjonslaget implementert direkte i applikasjonsprotokoller eller i TLS.
          - heading "OSI i feilsøking" [level=3] [ref=e198]
          - paragraph [ref=e199]: "OSI-modellen er særlig nyttig ved feilsøking. Tenk deg et problem der en bruker ikke kommer på internett:"
          - list [ref=e200]:
            - listitem [ref=e201]:
              - strong [ref=e202]: Lag 1
              - text: — Er kabelen plugget inn? Lyser linklys?
            - listitem [ref=e203]:
              - strong [ref=e204]: Lag 2
              - text: — Svitsjen ser MAC-adressen? Feil VLAN?
            - listitem [ref=e205]:
              - strong [ref=e206]: Lag 3
              - text: — Har maskinen riktig IP-adresse og gateway? Kan du pinge gateway?
            - listitem [ref=e207]:
              - strong [ref=e208]: Lag 4
              - text: — Blokkeres TCP-port 443 av brannmur?
            - listitem [ref=e209]:
              - strong [ref=e210]: Lag 7
              - text: — Feil i nettleserens konfigurasjon? DNS fungerer men HTTP feiler?
          - paragraph [ref=e211]: Ved å jobbe systematisk nedenfra og opp (eller ovenfra og ned) isolerer du problemet raskt.
