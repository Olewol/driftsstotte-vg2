          - heading "OSI-modellen" [level=1] [ref=e41]
          - heading "Introduksjon" [level=2] [ref=e42]
          - paragraph [ref=e43]:
            - text: OSI-modellen (Open Systems Interconnection) er en 7-lags referansemodell utviklet av ISO på slutten av 1970-tallet. Den ble aldri den dominerende implementasjonen i praksis — det ble TCP/IP — men OSI er blitt den universelle standarden for å
            - emphasis [ref=e44]: beskrive og forstå
            - text: nettverkskommunikasjon. I feilsøking er spørsmålet “på hvilket lag oppstår problemet?” en av de mest nyttige du kan stille.
          - paragraph [ref=e45]:
            - text: OSI-modellen er tett knyttet til
            - link "tcp-ip-modellen" [ref=e46] [cursor=pointer]:
