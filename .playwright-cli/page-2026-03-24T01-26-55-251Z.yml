          - paragraph [ref=e246]: "Analyser:"
          - list [ref=e247]:
            - listitem [ref=e248]: Lag 1–3 fungerer (ping til gateway virker → fysisk forbindelse, datalink og IP er OK)
            - listitem [ref=e249]: Problemet er på lag 4 (TCP-port blokkert?), lag 6 (TLS-feil?) eller lag 7 (DNS feiler? HTTP-feil?)
            - listitem [ref=e250]:
              - text: "Test:"
              - code [ref=e251]: nslookup ndla.no
              - text: — hvis DNS ikke svarer er problemet lag 7 (DNS-tjenesten) eller lag 3 (ruting mot DNS-server)
          - heading "Study guide" [level=2] [ref=e252]
          - paragraph [ref=e253]:
            - strong [ref=e254]: OSI-modellens formål
            - text: OSI er en
            - emphasis [ref=e255]: referansemodell
            - text: ", ikke en implementasjon. Den brukes som felles referansespråk for å forstå og feilsøke nettverkskommunikasjon. Hvert lag har et klart ansvarsområde og kommuniserer kun med laget direkte over og under."
          - paragraph [ref=e256]:
            - strong [ref=e257]: Kjerneforståelse per lag
          - list [ref=e258]:
            - listitem [ref=e259]: Lag 1–2 handler om fysisk og lokal overføring (kabel, WiFi, svitsjer, MAC-adresser)
            - listitem [ref=e260]: Lag 3 introduserer logisk adressering og ruting (IP, rutere)
            - listitem [ref=e261]: Lag 4 håndterer ende-til-ende pålitelighet og applikasjonsidentifikasjon (TCP/UDP, portnumre)
            - listitem [ref=e262]: Lag 5–7 er applikasjonsrelaterte (sesjoner, formatering, brukerprotokoller)
          - paragraph [ref=e263]:
            - strong [ref=e264]: Vanlige eksamenspoeng
          - list [ref=e265]:
            - listitem [ref=e266]: Forskjellen mellom svitsj (lag 2) og ruter (lag 3)
            - listitem [ref=e267]: TCP vs. UDP og når man bruker hva
            - listitem [ref=e268]: OSI-lagene ovenfra og ned vs. nedenfra og opp
            - listitem [ref=e269]: "Innkapsling: hva skjer med data når det sendes nedover i stakken"
          - heading "FAQ" [level=2] [ref=e270]
          - paragraph [ref=e271]:
            - strong [ref=e272]: Hvorfor bruker vi OSI-modellen når TCP/IP er det som faktisk brukes?
            - text: OSI gir oss et presist og delt referansespråk for å snakke om nettverksproblemer og protokoller. Når en teknikker sier “problemet er på lag 2”, forstår alle hva det betyr — selv om nettverket kjører TCP/IP.
          - paragraph [ref=e273]:
            - strong [ref=e274]: Hva er forskjellen mellom lag 3 og lag 2-adresser?
            - text: Lag 2 bruker MAC-adresser (fysiske, hardkodede) for kommunikasjon innenfor ett nettverk. Lag 3 bruker IP-adresser (logiske, konfigurerbare) for kommunikasjon mellom ulike nettverk.
          - paragraph [ref=e275]:
            - strong [ref=e276]: Hva skjer på lag 6 (presentasjonslaget) i praksis?
            - text: Kryptering via TLS/SSL er det vanligste eksemplet. Når du besøker en HTTPS-side, krypterer lag 6 dataene. Komprimering (gzip) og tegnkonvertering (UTF-8) er andre eksempler.
          - paragraph [ref=e277]:
            - strong [ref=e278]: Kan ett stykke maskinvare operere på flere lag?
            - text: Ja. En “lag 3-svitsj” opererer på både lag 2 og lag 3 — den kan route mellom VLAN-er i tillegg til å fungere som vanlig svitsj. Brannmurer opererer ofte på lag 3–7.
          - paragraph [ref=e279]:
            - strong [ref=e280]: Hva er PDU, og hvorfor er begrepet nyttig?
            - text: "PDU (Protocol Data Unit) er betegnelsen på dataenheten på et gitt lag: Segment (lag 4), Pakke (lag 3), Ramme (lag 2), Bit (lag 1). Det gjør det enklere å beskrive nøyaktig hva som behandles på hvert trinn."
          - paragraph [ref=e281]:
            - strong [ref=e282]: Hva er innkapsling?
            - text: Innkapsling er prosessen der data pakkes inn i kontrollinformasjon (headers) fra hvert lag i OSI-modellen når de sendes nedover i stakken. På mottakersiden pakkes det ut lag for lag.
          - paragraph [ref=e283]:
            - strong [ref=e284]: Hvorfor er sesjonslaget (lag 5) viktig?
            - text: Sesjonslaget administrerer dialogen mellom applikasjoner — hvem snakker, i hvilken rekkefølge, og hvordan avslutter man ryddig. I praksis er dette ofte integrert i TLS og applikasjonsprotokoller.
          - paragraph [ref=e285]:
            - strong [ref=e286]: Hvordan bruker jeg OSI aktivt i feilsøking?
            - text: "Start fra lag 1 og jobb oppover: sjekk kabel → svitsj → IP-adresse → brannmur-porter → applikasjonsinnstillinger. Eller start fra lag 7 og jobb nedover hvis du vet at nettverket fungerer."
