          - heading "Study guide" [level=2] [ref=e277]
          - paragraph [ref=e278]:
            - strong [ref=e279]: DHCP — kjerneforståelse
            - text: DHCP automatiserer IP-konfigurasjonen. DORA-prosessen (Discover → Offer → Request → Acknowledge) er den mekanismen som skjer i bakgrunnen. Et scope definerer adresserommet. Leasetid styrer hvor lenge en adresse holdes av en klient.
          - paragraph [ref=e280]:
            - strong [ref=e281]: DNS — kjerneforståelse
            - text: DNS er hierarkisk (rot → TLD → domene → vertsnavn). A-posten er den viktigste. CNAME brukes til alias. MX peker til e-postserver. PTR brukes til omvendt oppslag. I AD er DNS-serveren autoritativ for det lokale domenet.
          - paragraph [ref=e282]:
            - strong [ref=e283]: Vanlige eksamenspoeng
          - list [ref=e284]:
            - listitem [ref=e285]: DORA-prosessen steg for steg
            - listitem [ref=e286]: Hva de ulike DNS-posttypene gjør (A, AAAA, CNAME, MX, PTR)
            - listitem [ref=e287]: Forskjellen mellom autoritativ DNS-server og rekursiv resolver
            - listitem [ref=e288]: Hva en forwarder er
            - listitem [ref=e289]: Kommandoene ipconfig, nslookup
          - heading "FAQ" [level=2] [ref=e290]
          - paragraph [ref=e291]:
            - strong [ref=e292]: Hva betyr forkortelsen DORA i DHCP-sammenheng?
            - text: DORA står for Discover, Offer, Request, Acknowledge — de fire meldingene i DHCP-prosessen der klienten finner en server, mottar et tilbud, aksepterer det og serveren bekrefter tildelingen.
          - paragraph [ref=e293]:
            - strong [ref=e294]: Hva er en DNS A-post?
            - text: En A-post (Address) er en DNS-post som kobler et domenenavn til en IPv4-adresse. F.eks.
            - code [ref=e295]: ndla.no → 185.45.32.10
            - text: .
          - paragraph [ref=e296]:
            - strong [ref=e297]: Hvorfor sendes DHCP Discover som broadcast?
            - text: Fordi klienten ikke har en IP-adresse ennå og ikke vet hvilken adresse DHCP-serveren har. Broadcast (
            - code [ref=e298]: 255.255.255.255
            - text: ) når alle enheter på det lokale nettverket, inkludert DHCP-serveren.
          - paragraph [ref=e299]:
            - strong [ref=e300]: Hva er en DNS forwarder?
            - text: "En forwarder er en konfigurasjon på DNS-serveren som sier: “Oppslag jeg ikke kan besvare selv, sender jeg videre til denne andre DNS-serveren.” I AD-nettverk peker forwarderen typisk mot ruterens IP for å løse opp internettadresser."
          - paragraph [ref=e301]:
            - strong [ref=e302]: Hva er forskjellen mellom en PTR-post og en A-post i DNS?
            - text: En A-post oversetter navn til IP (fremover-oppslag). En PTR-post (Pointer) gjør det motsatte — den oversetter IP-adresse til navn (omvendt oppslag/reverse lookup). PTR-poster brukes bl.a. av e-postservere og logger.
          - paragraph [ref=e303]:
            - strong [ref=e304]: Hva er scope og lease i DHCP?
            - text: Scope er adresserommet DHCP-serveren kan dele ut. Lease er tidsavtalen — klienten “låner” adressen for en bestemt periode. Når leaseperioden nærmer seg slutten, fornyes den automatisk.
          - paragraph [ref=e305]:
            - strong [ref=e306]: Hva skjer hvis det er to DHCP-servere på samme nettverk?
            - text: Det gir IP-adressekonflikter. Begge serverne kan tildele samme adresse til ulike klienter, noe som skaper kaos. I domenenettverk deaktiveres alltid DHCP på ruteren når Windows Server-DHCP er konfigurert.
          - paragraph [ref=e307]:
            - strong [ref=e308]: Hva er DHCP-snooping og DNS-spoofing?
            - text: DNS-spoofing er et angrep der falske DNS-svar omdirigerer brukere til ondsinnede nettsteder. DHCP-snooping er en svitsjefunksjon som blokkerer falske DHCP-servere ved å godkjenne DHCP-svar kun fra betrodde porter.
