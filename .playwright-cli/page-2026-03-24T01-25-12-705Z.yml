          - paragraph [ref=e268]: "Vanlige problemer og tiltak:"
          - list [ref=e269]:
            - listitem [ref=e270]:
              - strong [ref=e271]: Ingen IP-adresse
              - text: ": klienten har ikke nådd DHCP-serveren (sjekk om scope er aktivt, om DHCP på ruter er av, om det er nok ledige adresser)"
            - listitem [ref=e272]:
