          - 'heading "Sikkerhet: DNS-spoofing og DHCP-snooping" [level=4] [ref=e224]'
          - paragraph [ref=e225]:
            - text: DNS-spoofing er et angrep der en angriper sender falske DNS-svar for å omdirigere brukere til ondsinnede nettsteder. DNSSEC (DNS Security Extensions) kan brukes til å beskytte mot dette. I svitsjer brukes
            - strong [ref=e226]: DHCP snooping
            - text: "for å hindre falske DHCP-servere: svitsjen blokkerer DHCP-svar fra porter som ikke er konfigurert som betrodde."
