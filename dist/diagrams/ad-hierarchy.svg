<svg width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .arr { stroke: #5f5e5a; stroke-width: 1.5px; fill: none; }
  .box-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 8; }
  .box-teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 8; }
  .box-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5px; rx: 8; }
  .box-coral > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5px; rx: 8; }
  .box-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5px; rx: 8; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<g class="box-gray">
  <rect x="240" y="10" width="200" height="40"/>
  <text class="th" x="340" y="30" text-anchor="middle" dominant-baseline="central">Forest (Skog)</text>
</g>
<g class="box-teal">
  <rect x="80" y="90" width="200" height="40"/>
  <text class="th" x="180" y="110" text-anchor="middle" dominant-baseline="central">Tre / Tree 1</text>
</g>
<g class="box-teal">
  <rect x="400" y="90" width="200" height="40"/>
  <text class="th" x="500" y="110" text-anchor="middle" dominant-baseline="central">Tre / Tree 2</text>
</g>
<line x1="340" y1="50" x2="180" y2="90" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="50" x2="500" y2="90" class="arr" marker-end="url(#arrow)"/>
<g class="box-coral">
  <rect x="80" y="180" width="200" height="44"/>
  <text class="th" x="180" y="202" text-anchor="middle" dominant-baseline="central">Domene: firma.local</text>
</g>
<g class="box-coral">
  <rect x="400" y="180" width="200" height="44"/>
  <text class="th" x="500" y="202" text-anchor="middle" dominant-baseline="central">Domene: avdeling.local</text>
</g>
<line x1="180" y1="130" x2="180" y2="180" class="arr" marker-end="url(#arrow)"/>
<line x1="500" y1="130" x2="500" y2="180" class="arr" marker-end="url(#arrow)"/>
<g class="box-purple">
  <rect x="30" y="280" width="140" height="40"/>
  <text class="ts" x="100" y="300" text-anchor="middle" dominant-baseline="central">OU=Salg</text>
</g>
<g class="box-purple">
  <rect x="180" y="280" width="140" height="40"/>
  <text class="ts" x="250" y="300" text-anchor="middle" dominant-baseline="central">OU=IT</text>
</g>
<g class="box-purple">
  <rect x="330" y="280" width="140" height="40"/>
  <text class="ts" x="400" y="300" text-anchor="middle" dominant-baseline="central">OU=Økonomi</text>
</g>
<g class="box-purple">
  <rect x="480" y="280" width="160" height="40"/>
