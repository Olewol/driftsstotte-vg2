</g>
<line x1="180" y1="224" x2="100" y2="280" class="arr" marker-end="url(#arrow)"/>
<line x1="180" y1="224" x2="250" y2="280" class="arr" marker-end="url(#arrow)"/>
<line x1="180" y1="224" x2="400" y2="280" class="arr" marker-end="url(#arrow)"/>
<line x1="180" y1="224" x2="560" y2="280" class="arr" marker-end="url(#arrow)"/>
</svg>