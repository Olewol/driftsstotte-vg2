<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .vm-box > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 10; }
  .ct-box > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 10; }
  .host { fill: none; stroke: #5F5E5A; stroke-width: 0.5px; stroke-dasharray: 6 4; rx: 12; }
</style>
<text class="th" x="340" y="24" text-anchor="middle" font-size="16">VM vs Container</text>
<g class="vm-box"><rect x="30" y="45" width="290" height="225"/>
<text class="th" x="175" y="70" text-anchor="middle">VM (virtuell maskin)</text>
<rect class="host" x="55" y="85" width="240" height="170"/>
<text class="ts" x="75" y="105" fill="#5F5E5A">Hypervisor</text>
<rect class="host" x="75" y="120" width="200" height="120"/>
<text class="ts" x="90" y="138" fill="#5F5E5A">Gjeste-OS (Windows)</text>
<text class="ts" x="90" y="158">App A</text>
<text class="ts" x="90" y="178">Biblioteker</text>
<text class="ts" x="90" y="198">Kjerne</text>
<text class="ts" x="175" y="235" text-anchor="middle">Størrelse: flere GB</text>
<text class="ts" x="175" y="255" text-anchor="middle">Oppstart: minutter</text>
</g>
<g class="ct-box"><rect x="360" y="45" width="290" height="225"/>
<text class="th" x="505" y="70" text-anchor="middle">Container</text>
<rect class="host" x="385" y="85" width="240" height="170"/>
<text class="ts" x="400" y="105" fill="#5F5E5A">Container engine (Docker)</text>
<text class="ts" x="400" y="125">Verts-OS-kjerne (delt)</text>
<rect class="host" x="400" y="145" width="100" height="95" rx="6"/>
<text class="ts" x="410" y="163">App X</text>
<text class="ts" x="410" y="183">Bibl.</text>
<text class="ts" x="410" y="203">~50 MB</text>
<rect class="host" x="515" y="145" width="95" height="95" rx="6"/>
<text class="ts" x="525" y="163">App Y</text>
<text class="ts" x="525" y="183">Bibl.</text>
<text class="ts" x="525" y="203">~50 MB</text>
<text class="ts" x="505" y="235" text-anchor="middle">Størrelse: MB</text>
<text class="ts" x="505" y="255" text-anchor="middle">Oppstart: sekunder</text>
</g>
</svg>