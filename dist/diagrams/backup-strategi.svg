<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .full > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 6; }
  .inc > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 6; }
  .diff > rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5px; rx: 6; }
  .arr { stroke: #5f5e5a; stroke-width: 1.5px; fill: none; }
  .timeline { stroke: #b4b2a9; stroke-width: 2px; }
  .dot { fill: #5f5e5a; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<text class="th" x="340" y="24" text-anchor="middle" font-size="16">Backupstrategi — typisk oppsett</text>
<line x1="50" y1="70" x2="630" y2="70" class="timeline"/>
<circle cx="80" cy="70" r="6" class="dot"/>
<circle cx="250" cy="70" r="6" class="dot"/>
<circle cx="420" cy="70" r="6" class="dot"/>
<circle cx="590" cy="70" r="6" class="dot"/>
<g class="full"><rect x="40" y="100" width="140" height="44"/><text class="th" x="110" y="122" text-anchor="middle" dominant-baseline="central">Full backup</text></g>
<g class="inc"><rect x="210" y="100" width="140" height="44"/><text class="th" x="280" y="122" text-anchor="middle" dominant-baseline="central">Inkrementell</text></g>
<g class="inc"><rect x="380" y="100" width="140" height="44"/><text class="th" x="450" y="122" text-anchor="middle" dominant-baseline="central">Inkrementell</text></g>
<g class="inc"><rect x="550" y="100" width="140" height="44"/><text class="th" x="620" y="122" text-anchor="middle" dominant-baseline="central">Inkrementell</text></g>
<line x1="180" y1="122" x2="208" y2="122" class="arr" marker-end="url(#arrow)"/>
<line x1="350" y1="122" x2="378" y2="122" class="arr" marker-end="url(#arrow)"/>
<line x1="520" y1="122" x2="548" y2="122" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="80" y="172" text-anchor="middle">Søndag</text>
<text class="ts" x="250" y="172" text-anchor="middle">Mandag</text>
<text class="ts" x="420" y="172" text-anchor="middle">Tirsdag</text>
<text class="ts" x="590" y="172" text-anchor="middle">Onsdag</text>
<text class="ts" x="340" y="200" text-anchor="middle" font-size="11">Full backup tar lengst tid, men gjenoppretting er raskest</text>
<text class="ts" x="340" y="218" text-anchor="middle" font-size="11">Inkrementell: minst lagring, rask backup, tregest restore</text>
<text class="ts" x="340" y="236" text-anchor="middle" font-size="11" fill="#0F6E56">Anbefalt: Full ukentlig + inkrementell daglig</text>
</svg>