<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .b1 > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 8; }
  .b2 > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 8; }
  .b3 > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5px; rx: 8; }
  .b4 > rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5px; rx: 8; }
  .b5 > rect { fill: #FBEAF0; stroke: #993556; stroke-width: 0.5px; rx: 8; }
  .b6 > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5px; rx: 8; }
</style>
<text class="th" x="340" y="24" text-anchor="middle" font-size="16">Dokumentasjonstyper i IT-drift</text>
<g class="b1"><rect x="30" y="50" width="290" height="50"/><text class="th" x="175" y="68" text-anchor="middle" dominant-baseline="central">Nettverkskart (topologi)</text><text class="ts" x="175" y="88" text-anchor="middle" dominant-baseline="central">Diagram: Visio, draw.io</text></g>
<g class="b2"><rect x="360" y="50" width="290" height="50"/><text class="th" x="505" y="68" text-anchor="middle" dominant-baseline="central">IP-adresseplan</text><text class="ts" x="505" y="88" text-anchor="middle" dominant-baseline="central">Regneark / Wiki</text></g>
<g class="b3"><rect x="30" y="120" width="290" height="50"/><text class="th" x="175" y="138" text-anchor="middle" dominant-baseline="central">Endringslogg</text><text class="ts" x="175" y="158" text-anchor="middle" dominant-baseline="central">Hva + Hvem + Hvorfor + Når</text></g>
<g class="b4"><rect x="360" y="120" width="290" height="50"/><text class="th" x="505" y="138" text-anchor="middle" dominant-baseline="central">Passordhvelv</text><text class="ts" x="505" y="158" text-anchor="middle" dominant-baseline="central">KeePass, Bitwarden — kryptert</text></g>
<g class="b5"><rect x="30" y="190" width="290" height="50"/><text class="th" x="175" y="208" text-anchor="middle" dominant-baseline="central">Brannmurregler</text><text class="ts" x="175" y="228" text-anchor="middle" dominant-baseline="central">Kilde + destinasjon + port + regelid</text></g>
<g class="b6"><rect x="360" y="190" width="290" height="50"/><text class="th" x="505" y="208" text-anchor="middle" dominant-baseline="central">Prosedyrebeskrivelser</text><text class="ts" x="505" y="228" text-anchor="middle" dominant-baseline="central">Slik gjør vi vanlige oppgaver</text></g>
<text class="ts" x="175" y="265" text-anchor="middle">Feilsøking + onboarding</text>
<text class="ts" x="505" y="265" text-anchor="middle">Sporbarhet + kontinuitet</text>
</svg>