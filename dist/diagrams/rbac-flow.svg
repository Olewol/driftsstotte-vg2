<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; font-weight: 500; }
  .b1 > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 8; }
  .b2 > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 8; }
  .b3 > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5px; rx: 8; }
  .b4 > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5px; rx: 8; }
  .arr { stroke: #5f5e5a; stroke-width: 1.5px; fill: none; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<text class="th" x="340" y="24" text-anchor="middle" font-size="16">RBAC — Rollebasert tilgangskontroll</text>
<g class="b4"><rect x="40" y="50" width="160" height="44"/><text class="t" x="120" y="72" text-anchor="middle" dominant-baseline="central">Opprett gruppe</text></g>
<g class="b4"><rect x="260" y="50" width="160" height="44"/><text class="t" x="340" y="72" text-anchor="middle" dominant-baseline="central">Plasser bruker</text></g>
<g class="b4"><rect x="480" y="50" width="160" height="44"/><text class="t" x="560" y="72" text-anchor="middle" dominant-baseline="central">Gi tilganger til gruppen</text></g>
<line x1="200" y1="72" x2="255" y2="72" class="arr" marker-end="url(#arrow)"/>
<line x1="420" y1="72" x2="475" y2="72" class="arr" marker-end="url(#arrow)"/>
<g class="b1"><rect x="40" y="150" width="180" height="44"/><text class="ts" x="130" y="172" text-anchor="middle" dominant-baseline="central">SG_Admin</text></g>
<g class="b2"><rect x="250" y="150" width="180" height="44"/><text class="ts" x="340" y="172" text-anchor="middle" dominant-baseline="central">SG_Salg</text></g>
<g class="b3"><rect x="460" y="150" width="180" height="44"/><text class="ts" x="550" y="172" text-anchor="middle" dominant-baseline="central">SG_Drift</text></g>
<line x1="120" y1="94" x2="130" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="94" x2="340" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="560" y1="94" x2="550" y2="150" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="130" y="220" text-anchor="middle">Bruker A → SG_Admin</text>
<text class="ts" x="340" y="220" text-anchor="middle">Bruker B → SG_Salg</text>
<text class="ts" x="550" y="220" text-anchor="middle">Bruker C → SG_Drift</text>
<text class="ts" x="130" y="240" text-anchor="middle">→ tilgang til servere</text>
<text class="ts" x="340" y="240" text-anchor="middle">→ tilgang til CRM</text>
<text class="ts" x="550" y="240" text-anchor="middle">→ tilgang til overvåking</text>
<text class="ts" x="340" y="275" text-anchor="middle" font-size="11" fill="#993C1D">Brukeren arver rettighetene via gruppen — aldri gi rettigheter til enkeltbruker</text>
</svg>