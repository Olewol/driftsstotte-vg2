<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;height:auto;background:transparent;">
<style>
  .t { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a18; }
  .ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #5f5e5a; }
  .th { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #1a1a18; font-weight: 500; }
  .l7 > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5px; rx: 4; }
  .l6 > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5px; rx: 4; }
  .l5 > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5px; rx: 4; }
  .l4 > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5px; rx: 4; }
  .l3 > rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5px; rx: 4; }
  .l2 > rect { fill: #FBEAF0; stroke: #993556; stroke-width: 0.5px; rx: 4; }
  .l1 > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5px; rx: 4; }
</style>
<text class="th" x="340" y="24" text-anchor="middle" font-size="16">OSI-modellen</text>
<g class="l7"><rect x="80" y="40" width="520" height="38"/><text class="th" x="100" y="59">Lag 7: Applikasjon</text><text class="ts" x="480" y="59" text-anchor="end">HTTP, HTTPS, FTP, SMTP, SSH</text></g>
<g class="l6"><rect x="80" y="86" width="520" height="38"/><text class="th" x="100" y="105">Lag 6: Presentasjon</text><text class="ts" x="480" y="105" text-anchor="end">SSL/TLS, kryptering</text></g>
<g class="l5"><rect x="80" y="132" width="520" height="38"/><text class="th" x="100" y="151">Lag 5: Sesjon</text><text class="ts" x="480" y="151" text-anchor="end">NetBIOS, RPC</text></g>
<g class="l4"><rect x="80" y="178" width="520" height="38"/><text class="th" x="100" y="197">Lag 4: Transport</text><text class="ts" x="480" y="197" text-anchor="end">TCP (pålitelig) / UDP (raskt)</text></g>
<g class="l3"><rect x="80" y="224" width="520" height="38"/><text class="th" x="100" y="243">Lag 3: Nettverk</text><text class="ts" x="480" y="243" text-anchor="end">IP, ICMP, ARP</text></g>
<g class="l2"><rect x="80" y="270" width="520" height="38"/><text class="th" x="100" y="289">Lag 2: Link</text><text class="ts" x="480" y="289" text-anchor="end">Ethernet, Wi-Fi (802.11)</text></g>
<g class="l1"><rect x="80" y="316" width="520" height="38"/><text class="th" x="100" y="335">Lag 1: Fysisk</text><text class="ts" x="480" y="335" text-anchor="end">Kabling, fiber, signaler</text></g>
</svg>